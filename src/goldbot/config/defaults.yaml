mode: paper
symbol: XAUUSD
loop_seconds: 60
timeframes:
  - M15
  - H1
  - H4
risk:
  risk_per_trade_pct: 0.5
  max_risk_per_trade_pct: 1.0
  max_daily_loss_pct: 2.0
  max_concurrent_positions: 1
  max_consecutive_losses: 3
  cooldown_minutes: 60
  duplicate_window_seconds: 120
ai:
  model: gpt-4o
  analysis_bars: 50
  timeout_seconds: 12
  retries: 1
execution:
  deviation: 20
  sl_atr_mult: 1.5
  tp_atr_mult: 2.0
journal:
  csv_path: trades.csv
  sqlite_path: ""
memory:
  db_path: memory.db
