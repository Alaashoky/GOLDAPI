mode: paper
symbol: XAUUSD
timeframe: M15
bars: 300
loop_seconds: 60
risk:
  risk_per_trade_pct: 0.5
  max_risk_per_trade_pct: 1.0
  max_daily_loss_pct: 2.0
  max_concurrent_positions: 1
  max_consecutive_losses: 3
  cooldown_minutes: 60
