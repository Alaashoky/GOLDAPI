  ema_slow: 50
  rsi_period: 14
  atr_period: 14
  bb_period: 20
  bb_std: 2.0
  breakout_lookback: 24
  atr_expansion_mult: 1.2
ai:
  enabled: true
  model: gpt-4o-mini
  timeout_seconds: 8
  retries: 1
  fail_behavior: reject
execution:
  deviation: 20
  sl_atr_mult: 1.5
  tp_atr_mult: 2.0
journal:
  csv_path: trades.csv
  sqlite_path: ""
